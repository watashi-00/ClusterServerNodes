name: Release per JDK

on:
  workflow_dispatch:
    inputs:
      run-for:
        description: 'Comma-separated list of JDKs to run (overrides matrix)'
        required: false
        default: '8,21'
  push:
    branches: [ build ]

permissions:
  contents: write

jobs:
  release:
    name: Create per-JDK tags
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jdk: [8, 21]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Show Java
        run: java -version

      - name: Compute base version and new version
        id: ver
        run: |
          BASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "base=${BASE_VERSION}" >> $GITHUB_OUTPUT
          NEW_VERSION=${BASE_VERSION}-jdk${{ matrix.jdk }}
          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Create release branch and bump version
        env:
          NEW_VERSION: ${{ steps.ver.outputs.new }}
          BASE_VERSION: ${{ steps.ver.outputs.base }}
        run: |
          BRANCH=release/jdk${{ matrix.jdk }}/${BASE_VERSION}
          git checkout -b "$BRANCH"
          mvn -B -DskipTests versions:set -DnewVersion="$NEW_VERSION" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore(release): $NEW_VERSION" || echo "no changes to commit"
          git push origin "$BRANCH"

      - name: Tag release and push tag
        env:
          NEW_VERSION: ${{ steps.ver.outputs.new }}
        run: |
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION" || true
          git push origin "$NEW_VERSION"

      - name: Trigger JitPack build
        env:
          NEW_VERSION: ${{ steps.ver.outputs.new }}
        run: |
          REPO=${GITHUB_REPOSITORY}
          URL="https://jitpack.io/com/github/${REPO}/${NEW_VERSION}/build.log"
          echo "Triggering JitPack build for ${REPO} tag ${NEW_VERSION}"
          # Try a few times as JitPack may take a moment to register the new tag
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL") || HTTP=000
            echo "Attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "JitPack build started/available for $NEW_VERSION"
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "Failed to trigger JitPack build for $NEW_VERSION (last HTTP=$HTTP)"
          exit 1
