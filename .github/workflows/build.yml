name: Release per JDK

on:
  workflow_dispatch:
    inputs:
      run-for:
        description: 'Comma-separated list of JDKs to run (overrides matrix)'
        required: false
        default: '8,21'

permissions:
  contents: write

jobs:
  release:
    name: Create per-JDK tags
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jdk: [8, 21]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Show Java
        run: java -version

      - name: Compute base version and new version
        id: ver
        run: |
          BASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "base=${BASE_VERSION}" >> $GITHUB_OUTPUT
          NEW_VERSION=${BASE_VERSION}-jdk${{ matrix.jdk }}
          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Create release branch and bump version
        env:
          NEW_VERSION: ${{ steps.ver.outputs.new }}
          BASE_VERSION: ${{ steps.ver.outputs.base }}
        run: |
          BRANCH=release/jdk${{ matrix.jdk }}/${BASE_VERSION}
          git checkout -b "$BRANCH"
          mvn -B -DskipTests versions:set -DnewVersion="$NEW_VERSION" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore(release): $NEW_VERSION" || echo "no changes to commit"
          git push origin "$BRANCH"

      - name: Tag release and push tag
        env:
          NEW_VERSION: ${{ steps.ver.outputs.new }}
        run: |
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION" || true
          git push origin "$NEW_VERSION"

      - name: (Optional) Trigger JitPack build
        # If you want to force JitPack to build immediately, you can call the JitPack API here.
        run: echo "JitPack build can be triggered here via API if desired"
