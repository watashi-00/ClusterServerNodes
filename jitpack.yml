install:
  - |
    if [ ! -z "$VERSION" ]; then
      mvn versions:set -DnewVersion=$VERSION
    fi
    if [[ $VERSION == *"jdk8" ]]; then
      mvn install -Pjava8 -Dmaven.test.skip=true
    elif [[ $VERSION == *"jdk17" ]]; then
      mvn install -Pjava17 -DskipTests
    elif [[ $VERSION == *"jdk21" ]]; then
      mvn install -Pjava21 -DskipTests
    fi

jdk:
  - openjdk21